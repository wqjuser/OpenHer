name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Static type check
        run: python -m pyright

      - name: Compile entrypoints
        run: python -m py_compile main.py wechat_adapter.py

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Compile packages
        run: python -m compileall agent engine memory persona providers server skills tests main.py wechat_adapter.py

      - name: Check whitespace
        run: git diff --check

      - name: Run backend smokes
        env:
          PYTHON: python
        run: |
          make backend-acceptance-smoke
          make backend-runtime-smoke
          make backend-websocket-smoke
          make backend-chat-smoke

  desktop:
    name: Desktop Swift build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Swift package
        working-directory: desktop/OpenHer
        run: swift build
